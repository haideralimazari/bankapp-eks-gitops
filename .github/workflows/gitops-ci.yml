name: GitOps CI 

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_REPO: haideralimazari/bankapp-eks

jobs:

  # ============================================================
  # 1. BUILD & TEST
  # ============================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    outputs:
      sha_short: ${{ steps.tag.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Run tests
        run: ./mvnw test -B
        continue-on-error: true

      - name: Generate Image Tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT


  # ============================================================
  # 2. DOCKER BUILD
  # ============================================================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.DOCKERHUB_REPO }}:${{ needs.build.outputs.sha_short }}


  # ============================================================
  # 3. DOCKER PUSH
  # ============================================================
  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ needs.build.outputs.sha_short }}


  # ============================================================
  # 4. GITOPS (UPDATE K8s)
  # ============================================================
  gitops-update:
    name: Update Kubernetes Manifest
    runs-on: ubuntu-latest
    needs: docker-push

    steps:
      - uses: actions/checkout@v4

      - name: Update Deployment Image
        run: |
          sed -i "s|image: ${{ env.DOCKERHUB_REPO }}:.*|image: ${{ env.DOCKERHUB_REPO }}:${{ needs.build.outputs.sha_short }}|" k8s/bankapp-deployment.yml

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/bankapp-deployment.yml
          git diff --staged --quiet || git commit -m "ci: update image to ${{ needs.build.outputs.sha_short }} [skip ci]"
          git push